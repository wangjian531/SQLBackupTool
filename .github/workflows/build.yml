name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - name: GUI
            file: sql_backup_gui.py
            windowed: --windowed
          - name: CLI
            file: sql_backup_cli.py
            windowed: --console
          - name: Scheduler
            file: sql_backup_scheduler.py
            windowed: --console

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pyodbc pymssql schedule requests

      - name: Build ${{ matrix.name }} EXE
        run: |
          pyinstaller --onefile ${{ matrix.windowed }} `
            --name "SQLBackup_${{ matrix.name }}" `
            --add-data "config.json;." `
            --hidden-import pymssql `
            --hidden-import pyodbc `
            --hidden-import schedule `
            ${{ matrix.file }}

      - name: Upload ${{ matrix.name }}
        uses: actions/upload-artifact@v4
        with:
          name: SQLBackup_${{ matrix.name }}
          path: dist/SQLBackup_${{ matrix.name }}.exe

  create_release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: SQLBackupTool v1.0.${{ github.run_number }}
          files: artifacts/**/*.exe
          generate_release_notes: true