name: Build SQLBackupTool EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - name: SQLBackupTool
            file: main.py
            windowed: --windowed

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pyodbc pymssql schedule requests smbprotocol

      - name: Build EXE
        run: |
          pyinstaller --onefile ${{ matrix.windowed }} `
            --name "${{ matrix.name }}" `
            --add-data "config.json;." `
            --hidden-import pymssql `
            --hidden-import pyodbc `
            --hidden-import schedule `
            --hidden-import sql_backup_core `
            --hidden-import sql_backup_tool_core `
            --hidden-import sql_backup_tool_gui `
            ${{ matrix.file }}

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}.exe

  create_release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: SQLBackupTool
          path: artifacts

      - name: Create Release
        id: tag
        run: echo "TAG=v1.0.$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: SQLBackupTool ${{ steps.tag.outputs.TAG }}
          files: artifacts/*.exe
          generate_release_notes: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}