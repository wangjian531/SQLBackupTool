name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pyodbc pymssql schedule requests

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name SQLBackupTool sql_backup_gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SQLBackupTool
          path: dist/SQLBackupTool.exe