name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pyodbc pymssql schedule requests

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name SQLBackupTool sql_backup_gui.py

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: SQLBackupTool v1.0.${{ github.run_number }}
          files: dist/SQLBackupTool.exe
          generate_release_notes: true